routes:
    "https://{all}/": { type: upstream, upstream: "app:http" }
    "http://{all}/": { type: redirect, to: "https://{all}/" }

services: {}

applications:
    app:
        source:
            root: "/"

        type: php:8.5

        runtime:
            extensions:
                - apcu
                - blackfire
                - ctype
                - iconv
                - mbstring
                - pdo_sqlite
                - sodium
                - xsl

        variables:
            php:
                opcache.preload: config/preload.php

        build:
            flavor: none

        web:
            locations:
                "/":
                    root: "public"
                    expires: 1h
                    passthru: "/index.php"

        mounts:
            "/var/cache": { source: instance, source_path: var/cache }
            "/var/share": { source: storage, source_path: var/share }
            "/data": { source: storage, source_path: "data" }
            "/.local": {source: storage, source_path: "opencode-data"}
            "/.config/opencode": {source: storage, source_path: "opencode-config"}
            "/.agents": {source: storage, source_path: "opencode-agents"}
            "/.opencode": {source: storage, source_path: "opencode-source"}
        hooks:
            build: |
                set -x -e

                curl -fs https://get.symfony.com/cloud/configurator | bash
                
                NODE_VERSION=22 symfony-build

            deploy: |
                set -x -e

                symfony-deploy

        crons:
            security-check:
                # Check that no security issues have been found for PHP packages deployed in production
                spec: '50 23 * * *'
                commands:
                    start: if [ "$PLATFORM_ENVIRONMENT_TYPE" = "production" ]; then croncape COMPOSER_ROOT_VERSION=1.0.0 COMPOSER_AUDIT_ABANDONED=ignore composer audit --no-cache; fi
            clean-expired-sessions:
                spec: '17,47 * * * *'
                commands:
                    start: croncape php-session-clean

tasks:
  myagent:
    source:
      root: /agent
    type: nodejs:24
    container_profile: "HIGH_MEMORY"
    dependencies:
      nodejs:
        opencode-ai: "*" # OpenCode
        upsun: "*"       # Upsun CLI
    run:
      command: node agent.js
      timeout: 3600
    authorizations: # allow the task to access the environment API (read-only)
      - type: env
        action: view
    variables:
      env:
        OPENCODE_THEME: "opencode"
        HOME: "/app"
    hooks:
      build: |
        set -ex

        echo "Install Upsun Skills..."
        npx skills add https://github.com/upsun/ai --skill upsun -g -y
        echo "Upsun Skills installed at $PLATFORM_APP_DIR/node_modules/.bin/upsun-mcp"
      deploy: |
        # Generate OpenCode config with the correct MCP server URL and API token
        envsubst < /app/opencode.json > /app/.config/opencode/opencode.json

    relationships:
      app: "app:http"
