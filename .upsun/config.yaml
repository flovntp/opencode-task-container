routes:
    "https://{all}/": { type: upstream, upstream: "app:http" }
    "http://{all}/": { type: redirect, to: "https://{all}/" }

services: {}

applications:
    app:
        source:
            root: "/"

        type: php:8.5

        runtime:
            extensions:
                - apcu
                - blackfire
                - ctype
                - iconv
                - mbstring
                - pdo_sqlite
                - sodium
                - xsl

        variables:
            env:
                IS_PRODUCTION: "true"
            php:
                opcache.preload: config/preload.php

        build:
            flavor: none

        web:
            locations:
                "/":
                    root: "public"
                    expires: 1h
                    passthru: "/index.php"

        mounts:
            "/var/cache": { source: instance, source_path: var/cache }
            "/var/share": { source: storage, source_path: var/share }
            "/data": { source: storage, source_path: "data" }
        hooks:
            build: |
                set -x -e

                curl -fs https://get.symfony.com/cloud/configurator | bash
                
                NODE_VERSION=22 symfony-build

            deploy: |
                set -x -e

                symfony-deploy
        authorizations:
            - type: task
              resource: myagent
              action: operate
            - type: env
              action: view
        
        crons:
            security-check:
                # Check that no security issues have been found for PHP packages deployed in production
                spec: '50 23 * * *'
                commands:
                    start: if [ "$PLATFORM_ENVIRONMENT_TYPE" = "production" ]; then croncape COMPOSER_ROOT_VERSION=1.0.0 COMPOSER_AUDIT_ABANDONED=ignore composer audit --no-cache; fi
            clean-expired-sessions:
                spec: '17,47 * * * *'
                commands:
                    start: croncape php-session-clean

tasks:
  myagent:
    source:
      root: /
    type: nodejs:24
    container_profile: "HIGH_MEMORY"
    dependencies:
      nodejs:
        opencode-ai: "*" # OpenCode
        upsun: "*"       # Upsun CLI
    run:
      command: node agent/agent.js
      timeout: 3600
    authorizations: # allow the task to access the environment API (read-only)
      - type: env
        action: view
    variables:
      env:
        OPENCODE_THEME: "opencode"
        HOME: "/app"
    hooks:
      build: |
        set -ex

        echo "Install Upsun Skills..."
        npx skills add https://github.com/upsun/ai --skill upsun -y
        echo "Upsun Skills installed at $PLATFORM_APP_DIR/node_modules/.bin/upsun-mcp"

        # Token optimisation: install the `snip` binary used by the opencode-snip
        # plugin to filter noisy shell output before it reaches the LLM context.
        # The three npm plugins (openslimedit / opencode-dcp / opencode-snip) are
        # fetched automatically by OpenCode at startup; only this Go binary needs
        # a manual install. Pinned + checksum-verified for reproducible builds.
        echo "Install snip (opencode-snip backend)..."
        SNIP_VERSION="0.18.0"
        SNIP_SHA256="3fa038fb3e23e07cd7e424e0c324f825464c28bfc4e33cbfd7acd9a92ea39e08"
        SNIP_TARBALL="snip_${SNIP_VERSION}_linux_amd64.tar.gz"
        SNIP_URL="https://github.com/edouard-claude/snip/releases/download/v${SNIP_VERSION}/${SNIP_TARBALL}"
        curl -fsSL "$SNIP_URL" -o "/tmp/${SNIP_TARBALL}"
        echo "${SNIP_SHA256}  /tmp/${SNIP_TARBALL}" | sha256sum -c -
        rm -rf /tmp/snip-extract && mkdir -p /tmp/snip-extract
        tar -xzf "/tmp/${SNIP_TARBALL}" -C /tmp/snip-extract
        # Install into node_modules/.bin, which agent.js already puts on PATH at
        # runtime (so opencode-snip can find `snip` from any working directory).
        mkdir -p "$PLATFORM_APP_DIR/node_modules/.bin"
        install -m 0755 /tmp/snip-extract/snip "$PLATFORM_APP_DIR/node_modules/.bin/snip"
        rm -rf "/tmp/${SNIP_TARBALL}" /tmp/snip-extract
        "$PLATFORM_APP_DIR/node_modules/.bin/snip" --version
        echo "snip installed."

    relationships:
      app: "app:http"
