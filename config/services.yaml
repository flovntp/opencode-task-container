# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.locale: 'en'
    app.notifications.email_sender: anonymous@example.com

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # this allows to define the scalar arguments once and apply them to any services
            # defined/created in this file; if some argument is used rarely, instead of defining
            # it here you can use the #[Autowire] attribute to inject it manually in the service constructor
            array $enabledLocales: '%kernel.enabled_locales%'
            string $defaultLocale: '%app.locale%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # The Upsun SDK client authenticates with a short-lived access token minted
    # from the container-local credential service (localhost:8200). The static
    # UPSUN_API_TOKEN was removed, so the factory fetches a fresh token per build
    # and injects it as a bearer token (no api_token OAuth exchange).
    Upsun\UpsunClient:
        factory: ['@App\Upsun\UpsunClientFactory', 'create']

    App\Github\GitHubAppTokenMinter:
        arguments:
            $appId:          '%env(GITHUB_APP_ID)%'
            $installationId: '%env(GITHUB_APP_INSTALLATION_ID)%'
            $privateKey:     '%env(GITHUB_APP_PRIVATE_KEY)%'
            $repository:     '%env(GITHUB_REPO)%'

    App\EventSubscriber\AutoRcaSubscriber:
        arguments:
            $upsunProjectId:     '%env(PLATFORM_PROJECT)%'
            $upsunEnvironmentId: '%env(PLATFORM_BRANCH)%'
            $upsunRcaTaskId:     '%env(UPSUN_RCA_TASK_ID)%'
            # Persistent, shared-across-instances mount (source: storage) so the
            # per-signature dedup survives restarts and works with >1 instance.
            $sharedStateDir:     '%kernel.project_dir%/var/share/auto_rca'
            $isProduction:       '%env(bool:IS_PRODUCTION)%'
